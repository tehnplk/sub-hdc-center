services:
  web:
    build: .
    container_name: plk-subhdc-web
    restart: unless-stopped
    ports:
      - "3014:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: "112233"
      DB_NAME: sub_hdc_center
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    container_name: plk-subhdc-db
    restart: unless-stopped
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "112233"
      POSTGRES_DB: sub_hdc_center
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sub_hdc_center"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
